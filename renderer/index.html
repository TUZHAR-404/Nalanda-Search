<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:; connect-src *; frame-src *;">
    <title>Nalanda Search</title>
    <link rel="stylesheet" href="styles/main.css?v=20260324a">
    <link rel="stylesheet" href="styles/themes.css?v=20260324a">
</head>

<body class="theme-dark">

    <!-- Settings Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Settings</h2>
            <button id="closeSidebar" class="close-btn" aria-label="Close settings">×</button>
        </div>

        <div class="sidebar-content">
            <!-- Appearance Section -->
            <section class="settings-section">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    Appearance
                </h3>

                <div class="setting-item">
                    <label for="themeSelect">Theme</label>
                    <select id="themeSelect" class="setting-select">
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="backgroundType">Background</label>
                    <select id="backgroundType" class="setting-select">
                        <option value="solid">Solid Color</option>
                        <option value="gradient">Gradient</option>
                        <option value="image">Image</option>
                    </select>
                </div>

                <div class="setting-item" id="solidColorOption">
                    <label for="backgroundColor">Color</label>
                    <input type="color" id="backgroundColor" value="#1a1a1a">
                </div>

                <div class="setting-item hidden" id="gradientOption">
                    <label>Gradient Preset</label>
                    <div class="gradient-presets">
                        <button class="gradient-btn"
                            data-gradient="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></button>
                        <button class="gradient-btn"
                            data-gradient="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"></button>
                        <button class="gradient-btn"
                            data-gradient="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"></button>
                        <button class="gradient-btn"
                            data-gradient="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"></button>
                        <button class="gradient-btn"
                            data-gradient="linear-gradient(135deg, #fa709a 0%, #fee140 100%)"></button>
                    </div>
                </div>

                <div class="setting-item hidden" id="imageOption">
                    <label for="backgroundImage">Image URL</label>
                    <input type="text" id="backgroundImage" placeholder="https://example.com/image.jpg"
                        class="setting-input">
                </div>
            </section>

            <!-- Agents Section -->
            <section class="settings-section">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    Agents
                </h3>
                <p class="section-description">Future integration point for n8n agents. Add modular, toggleable agents
                    here.</p>

                <div id="agentsList" class="agents-list">
                    <!-- Agents will be dynamically added here -->
                </div>

                <button id="addAgent" class="btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Agent
                </button>
            </section>

            <!-- General Settings -->
            <section class="settings-section">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M12 1v6m0 6v6m9-9h-6M7 12H1m16.24 4.24l-4.24-4.24m0 0L8.76 16.24M16.24 7.76L12 12m0 0L7.76 7.76">
                        </path>
                    </svg>
                    General Settings
                </h3>

                <div class="setting-item">
                    <label for="searchEngine">Search Index</label>
                    <select id="searchEngine" class="setting-select">
                        <option value="nalanda">Nalanda Index (Local)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="privacyMode" checked>
                        <span>Privacy mode (no telemetry)</span>
                    </label>
                </div>
            </section>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="main-content">
        <!-- Header with Controls -->
        <div class="header">
            <div class="header-controls">
                <!-- Dark/Light Mode Toggle -->
                <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle dark/light mode"
                    title="Toggle theme">
                    <div class="toggle-pill">
                        <div class="toggle-thumb">
                            <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                            </svg>
                            <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <circle cx="12" cy="12" r="4" fill="currentColor" />
                                <line x1="12" y1="2" x2="12" y2="5" />
                                <line x1="12" y1="19" x2="12" y2="22" />
                                <line x1="4.93" y1="4.93" x2="7.05" y2="7.05" />
                                <line x1="16.95" y1="16.95" x2="19.07" y2="19.07" />
                                <line x1="2" y1="12" x2="5" y2="12" />
                                <line x1="19" y1="12" x2="22" y2="12" />
                                <line x1="4.93" y1="19.07" x2="7.05" y2="16.95" />
                                <line x1="16.95" y1="7.05" x2="19.07" y2="4.93" />
                            </svg>
                        </div>
                    </div>
                </button>
                <!-- Settings Button -->
                <button id="settingsBtn" class="settings-icon" aria-label="Open settings">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6m9-9h-6M7 12H1"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="logo-container">
            <div class="logo-wordmark">
                <!-- Pixelated Elephant -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 96" width="72" height="96"
                    shape-rendering="crispEdges" class="pixel-elephant">
                    <!-- Row 0: top of head -->
                    <rect x="16" y="0" width="8" height="8" fill="#7BB5D9" />
                    <rect x="24" y="0" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="0" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 1: head -->
                    <rect x="8" y="8" width="8" height="8" fill="#7BB5D9" />
                    <rect x="16" y="8" width="8" height="8" fill="#7BB5D9" />
                    <rect x="24" y="8" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="8" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="8" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 2: head with eye -->
                    <rect x="8" y="16" width="8" height="8" fill="#7BB5D9" />
                    <rect x="16" y="16" width="8" height="8" fill="#1e3a5f" />
                    <rect x="24" y="16" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="16" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="16" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 3: head bottom -->
                    <rect x="8" y="24" width="8" height="8" fill="#7BB5D9" />
                    <rect x="16" y="24" width="8" height="8" fill="#7BB5D9" />
                    <rect x="24" y="24" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="24" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="24" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 4: trunk top + shoulder -->
                    <rect x="0" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="8" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="16" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="24" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="48" y="32" width="8" height="8" fill="#7BB5D9" />
                    <rect x="56" y="32" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 5: trunk narrows + body -->
                    <rect x="0" y="40" width="8" height="8" fill="#7BB5D9" />
                    <rect x="24" y="40" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="40" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="40" width="8" height="8" fill="#7BB5D9" />
                    <rect x="48" y="40" width="8" height="8" fill="#7BB5D9" />
                    <rect x="56" y="40" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 6: trunk curl + body -->
                    <rect x="8" y="48" width="8" height="8" fill="#7BB5D9" />
                    <rect x="24" y="48" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="48" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="48" width="8" height="8" fill="#7BB5D9" />
                    <rect x="48" y="48" width="8" height="8" fill="#7BB5D9" />
                    <rect x="56" y="48" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 7: body -->
                    <rect x="24" y="56" width="8" height="8" fill="#7BB5D9" />
                    <rect x="32" y="56" width="8" height="8" fill="#7BB5D9" />
                    <rect x="40" y="56" width="8" height="8" fill="#7BB5D9" />
                    <rect x="48" y="56" width="8" height="8" fill="#7BB5D9" />
                    <rect x="56" y="56" width="8" height="8" fill="#7BB5D9" />
                    <!-- Row 8: legs -->
                    <rect x="24" y="64" width="8" height="8" fill="#6BA8CC" />
                    <rect x="40" y="64" width="8" height="8" fill="#6BA8CC" />
                    <rect x="56" y="64" width="8" height="8" fill="#6BA8CC" />
                    <!-- Row 9: legs -->
                    <rect x="24" y="72" width="8" height="8" fill="#6BA8CC" />
                    <rect x="40" y="72" width="8" height="8" fill="#6BA8CC" />
                    <rect x="56" y="72" width="8" height="8" fill="#6BA8CC" />
                    <!-- Row 10: feet -->
                    <rect x="24" y="80" width="8" height="8" fill="#5A9BBF" />
                    <rect x="32" y="80" width="8" height="8" fill="#5A9BBF" />
                    <rect x="40" y="80" width="8" height="8" fill="#5A9BBF" />
                    <rect x="48" y="80" width="8" height="8" fill="#5A9BBF" />
                    <rect x="56" y="80" width="8" height="8" fill="#5A9BBF" />
                </svg>
                <!-- Wordmark -->
                <div class="logo-text-group">
                    <span class="logo-nalanda">Nalanda</span>
                    <span class="logo-search-text">search</span>
                </div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-container">
            <form id="searchForm" class="search-form">
                <div class="search-bar">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search the web with wisdom..."
                        autocomplete="off" aria-label="Search input">
                    <button type="button" id="micBtn" class="mic-btn" aria-label="Voice search" title="Click to speak">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button type="submit" class="search-btn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                <div id="voiceStatus" class="voice-status hidden">Listening...</div>
            </form>

            <!-- Keyboard Shortcuts Hint -->
            <div class="shortcuts-hint">
                Press <kbd>Ctrl</kbd> + <kbd>K</kbd> to focus search • <kbd>Ctrl</kbd> + <kbd>,</kbd> for settings
            </div>
        </div>

        <!-- Search Results Area -->
        <div id="resultsContainer" class="results-container hidden">
            <div class="results-header">
                <button id="closeResults" class="btn-secondary">← Back to Search</button>
                <div id="resultsMeta" class="results-meta"></div>
            </div>
            <div id="resultsList" class="results-list"></div>
        </div>
    </div>

    <!-- Agent Modal -->
    <div id="agentModal" class="modal hidden">
        <div class="modal-content">
            <h2>Add New Agent</h2>
            <form id="agentForm">
                <div class="form-group">
                    <label for="agentName">Agent Name</label>
                    <input type="text" id="agentName" required placeholder="e.g., Web Scraper">
                </div>
                <div class="form-group">
                    <label for="agentDescription">Description</label>
                    <textarea id="agentDescription" rows="3" placeholder="What does this agent do?"></textarea>
                </div>
                <div class="form-group">
                    <label for="agentEndpoint">n8n Webhook URL (optional)</label>
                    <input type="url" id="agentEndpoint" placeholder="https://your-n8n-instance.com/webhook/...">
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelAgent" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Add Agent</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js?v=20260324a"></script>
    <script src="js/app.js?v=20260324a"></script>
    <script src="js/search.js?v=20260324a"></script>
    <script src="js/speech.js?v=20260324a"></script>
    <script src="js/settings.js?v=20260324a"></script>
</body>

</html>
